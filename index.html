<!DOCTYPE html>
<html>
  
<head>
  <meta charset="utf-8">
  <title>Lab 1: Maker-Based WebAR</title>
<!-- 1. Load A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<!-- 2. Load AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
  
<body style="margin: 0; overflow: hidden;">
<!-- 3. Create the Scene -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <!-- 4. Define the Marker -->
    <a-marker preset="hiro">
      <!-- 5. Add 3D Content -->
      <a-box 
        position="-1 0.5 0" 
        scale="0.5 0.5 0.5" 
        material="color: #EF2D5E; transparent: true; opacity: 0.9;" 
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-box>

      <a-sphere 
        position="0 0.5 0" 
        radius="0.5" 
        color="#4CC3D9" 
        scale="0.8 0.8 0.8">
      </a-sphere>

      <a-cylinder 
        position="1 0.5 0" 
        radius="0.3" 
        height="1" 
        color="#FFC65D" 
        scale="0.8 0.8 0.8">
      </a-cylinder>

      <a-text 
        value="Nawaf Alsulaim" 
        position="0 1.5 0" 
        align="center" 
        color="#FFFFFF" 
        width="4">
      </a-text>

    </a-marker>
    <!-- 6. Add the Camera -->
    <a-entity camera></a-entity>
  </a-scene>
  
</body>
</html>
